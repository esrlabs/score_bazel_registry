name: Trigger bazel_registry_ui Update

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  dispatch-ui:
    if: ${{ github.event.repository.fork == false }}
    runs-on: ubuntu-24.04
    env:
      TARGET_REPOSITORY: ${{ github.repository_owner }}/bazel_registry_ui
      TARGET_WORKFLOW: deploy.yml
    steps:
      - name: Dispatch repository event to bazel_registry_ui
        env:
          GH_TOKEN: ${{ secrets.SCORE_BOT_CLASSIC_PAT }}
        run: |
          set -euxo pipefail

          gh_output="$(
            gh workflow run "$TARGET_WORKFLOW" \
              --repo "$TARGET_REPOSITORY" \
              --field bcrCommitHash="$GITHUB_SHA"
          )"


          run_id="$(
            grep -Eo 'gh run view [0-9]+' <<< "$gh_output" | cut -d' ' -f4 || true
          )"
          if [ -n "$run_id" ]; then
            run_url="$GITHUB_SERVER_URL/$TARGET_REPOSITORY/actions/runs/$run_id"
            printf 'Triggered %s workflow run [%s](%s)\n' \
              "$TARGET_REPOSITORY" "$run_id" "$run_url" >> "$GITHUB_STEP_SUMMARY"
            printf 'Triggered %s workflow run %s: %s\n' \
              "$TARGET_REPOSITORY" "$run_id" "$run_url"
          else
            printf 'GitHub CLI output:\n%s\n' "$gh_output" >&2
            exit 1
          fi
